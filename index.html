<!DOCTYPE html>
<html x-data="infoVerse()">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title x-text="t('brand') + ' | ' + t('heroTitle')"></title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body :class="lang === 'ar' ? 'font-arabic' : 'font-sans'">

    <!-- Navigation -->
    <nav class="glass-nav sticky top-0 z-50 nav-h h-20 flex items-center">
        <div class="max-w-7xl mx-auto px-4 w-full flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2">
                <div class="w-10 h-10 bg-sky-600 rounded-xl flex items-center justify-center text-white font-bold text-xl shadow-lg">IV</div>
                <span class="text-2xl font-black text-slate-900 tracking-tighter" x-text="t('brand')"></span>
            </a>
            <button @click="toggleLang()" class="px-5 py-2 rounded-full bg-slate-900 text-white text-xs font-bold transition hover:bg-sky-600 shadow-md">
                <span x-text="lang === 'ar' ? 'English' : 'العربية'"></span>
            </button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-12 space-y-16">
        <!-- Search Section -->
        <section class="text-center max-w-3xl mx-auto space-y-8">
            <h1 class="text-4xl md:text-6xl font-black text-slate-900 leading-tight" x-text="t('heroTitle')"></h1>
            <div class="relative">
                <input type="text" x-model="searchTerm" :placeholder="t('searchPlaceholder')" 
                       class="w-full h-16 ltr:pl-12 rtl:pr-12 rounded-2xl border border-slate-200 shadow-sm focus:border-sky-600 outline-none text-lg">
                <div class="absolute ltr:left-4 rtl:right-4 top-1/2 -translate-y-1/2 text-slate-300">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-width="2.5"/></svg>
                </div>
            </div>
        </section>

        <!-- Ad Spot -->
        <div class="ad-slot"></div>

        <!-- Categories Section -->
        <section class="space-y-8">
            <h3 class="text-sm font-bold uppercase tracking-widest text-slate-400" x-text="t('categoriesTitle')"></h3>
            <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-4">
                <template x-for="cat in categories">
                    <a :href="'category.html?cat=' + cat.id" class="cat-card p-6 rounded-2xl bg-white flex flex-col items-center gap-4 text-center">
                        <span class="text-3xl" x-text="cat.icon"></span>
                        <span class="text-xs font-bold text-slate-800" x-text="lang === 'ar' ? cat.ar : cat.en"></span>
                    </a>
                </template>
            </div>
        </section>

        <!-- Ad Spot -->
        <div class="ad-slot"></div>

        <!-- Latest Articles Section -->
        <section class="space-y-10">
            <h3 class="text-2xl font-black flex items-center gap-3">
                <span class="w-2 h-8 bg-sky-600 rounded-full"></span>
                <span x-text="t('latest')"></span>
            </h3>
            
            <div class="empty-state">
                <div class="text-5xl mb-4">📰</div>
                <p class="text-slate-400 font-bold" x-text="t('noLatest')"></p>
            </div>
        </section>
    </main>

    <footer class="bg-white border-t py-16 mt-20">
        <div class="max-w-7xl mx-auto px-4 grid md:grid-cols-4 gap-12 text-center md:text-start">
            <div class="md:col-span-2 space-y-4">
                <div class="text-2xl font-black text-sky-900" x-text="t('brand')"></div>
                <p class="text-slate-400 text-sm max-w-sm leading-relaxed" x-text="t('footerDesc')"></p>
            </div>
            <div class="space-y-4">
                <h4 class="text-xs font-bold uppercase text-slate-300 tracking-widest" x-text="t('home')"></h4>
                <div class="flex flex-col gap-3 text-sm font-bold text-slate-600">
                    <a href="about.html" class="hover:text-sky-600" x-text="t('about')"></a>
                    <a href="contact.html" class="hover:text-sky-600" x-text="t('contact')"></a>
                </div>
            </div>
            <div class="space-y-4">
                <h4 class="text-xs font-bold uppercase text-slate-300 tracking-widest" x-text="t('privacy')"></h4>
                <div class="flex flex-col gap-3 text-sm font-bold text-slate-600">
                    <a href="privacy.html" class="hover:text-sky-600" x-text="t('privacy')"></a>
                    <a href="terms.html" class="hover:text-sky-600" x-text="t('terms')"></a>
                </div>
            </div>
        </div>
        <div class="text-center mt-16 text-[10px] font-bold text-slate-200 tracking-widest uppercase">
            &copy; 2026 <span x-text="t('brand')"></span>. <span x-text="t('rights')"></span>
        </div>
    </footer>

    <script src="scripts.js"></script>
</body>
</html>
