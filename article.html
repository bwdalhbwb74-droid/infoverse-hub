<!DOCTYPE html>
<html x-data="infoVerse()">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title x-text="t('brand')"></title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body :class="lang === 'ar' ? 'font-arabic' : 'font-sans'">

    <nav class="glass-nav sticky top-0 z-50 h-20 flex items-center">
        <div class="max-w-7xl mx-auto px-4 w-full flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2">
                <div class="w-10 h-10 bg-sky-600 rounded-xl flex items-center justify-center text-white font-bold text-xl shadow-lg">IV</div>
                <span class="text-2xl font-black text-slate-900" x-text="t('brand')"></span>
            </a>
            <button @click="toggleLang()" class="px-5 py-2 rounded-full bg-slate-900 text-white text-xs font-bold transition hover:bg-sky-600"><span x-text="lang === 'ar' ? 'English' : 'العربية'"></span></button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 py-12 space-y-10">
        <!-- Breadcrumbs Placeholder -->
        <nav class="text-xs font-bold text-slate-400 uppercase tracking-widest flex gap-2">
            <a href="index.html" x-text="t('home')"></a> <span>/</span> <span class="text-sky-600">Article</span>
        </nav>

        <header class="space-y-6">
            <h1 class="text-4xl md:text-6xl font-black text-slate-900 leading-tight">Article Title</h1>
            <div class="flex gap-6 text-[10px] font-bold text-slate-400 uppercase border-y py-4">
                <span x-text="t('published') + ': --/--/----'"></span>
            </div>
        </header>

        <div class="w-full aspect-video bg-slate-100 rounded-[2.5rem] flex items-center justify-center text-slate-300">
            Image Placeholder
        </div>

        <div class="ad-slot"></div>

        <div class="prose prose-slate max-w-none text-slate-600 leading-loose">
            <p>Content will be available soon...</p>
        </div>
    </main>

    <script src="scripts.js"></script>
</body>
</html>
