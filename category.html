<!DOCTYPE html>
<html x-data="infoVerse()">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title x-text="activeCategory ? (lang === 'ar' ? activeCategory.ar : activeCategory.en) : t('brand')"></title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body :class="lang === 'ar' ? 'font-arabic' : 'font-sans'">

    <nav class="glass-nav sticky top-0 z-50 h-20 flex items-center">
        <div class="max-w-7xl mx-auto px-4 w-full flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2">
                <div class="w-10 h-10 bg-sky-600 rounded-xl flex items-center justify-center text-white font-bold text-xl shadow-lg">IV</div>
                <span class="text-2xl font-black text-slate-900" x-text="t('brand')"></span>
            </a>
            <button @click="toggleLang()" class="px-5 py-2 rounded-full bg-slate-900 text-white text-xs font-bold shadow-md"><span x-text="lang === 'ar' ? 'English' : 'العربية'"></span></button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-20">
        <div class="text-center space-y-4 mb-20" x-show="activeCategory">
            <span class="text-5xl" x-text="activeCategory.icon"></span>
            <h1 class="text-5xl font-black text-slate-900" x-text="lang === 'ar' ? activeCategory.ar : activeCategory.en"></h1>
        </div>

        <div class="empty-state">
            <p class="text-slate-400 font-bold" x-text="t('noArticles')"></p>
        </div>
    </main>

    <script src="scripts.js"></script>
</body>
</html>
